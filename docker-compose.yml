# ==========================================
# Docker Compose para Desarrollo Local
# Solo PostgreSQL - API y Web se ejecutan con pnpm dev
# ==========================================
# Uso: docker compose up -d
# ==========================================

services:
  postgres:
    image: postgres:15-alpine
    container_name: excepio-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: gzQFyXv95B2@Xe
      POSTGRES_DB: excepio
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d excepio"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
